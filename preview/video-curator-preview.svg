  <g filter="url(#cardShadow)">
    <rect x="108" y="1632" width="864" height="458" rx="38" fill="#FFFDF8"/>
    <text x="150" y="1708" fill="#18312B" font-family="Arial, sans-serif" font-size="40" font-weight="700">交互逻辑预览</text>
    <text x="150" y="1772" fill="#6B756F" font-family="Arial, sans-serif" font-size="30">1. 点击“导入视频文件夹”后，App 会递归扫描该目录下所有常见视频格式。</text>
    <text x="150" y="1838" fill="#6B756F" font-family="Arial, sans-serif" font-size="30">2. 每个视频自动读取时长、修改时间，并生成统一缩略图预览。</text>
    <text x="150" y="1904" fill="#6B756F" font-family="Arial, sans-serif" font-size="30">3. 评分是十星制，支持按评分、名称、时长、修改时间和手动顺序排序。</text>
    <text x="150" y="1970" fill="#6B756F" font-family="Arial, sans-serif" font-size="30">4. 处于“手动排序”时，长按卡片即可拖拽重排，结果会保存到本机。</text>
    <rect x="150" y="2016" width="258" height="16" rx="8" fill="#FFB87F"/>
    <rect x="150" y="2050" width="640" height="16" rx="8" fill="#F0E6D7"/>
